<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>
<body class="bg-[#030303]">

    <header class="flex p-[20px] justify-between items-center max-w-[1300px] m-auto">
        <div>
         <img src="./src/images/Logo.png" alt="">
        </div>
        <nav class="hidden lg:flex text-white gap-[30px] font-[300]">
            <a href="">Home</a>
            <a href="">Services</a>
            <a href="">Careers</a>
            <a href="">Career Details</a>
            <a href="">Contact</a>
        </nav>
        <button class="bg-[#0A84FF] text-white font-bold rounded-[10px] px-[20px] h-[42px]">Contact Us</button>
    </header>

    <main>
        <section class="px-[20px] my-[50px] max-w-[1300px] m-auto">
            <div style="background-image:url(./src/images/); background-repeat: no-repeat; background-size: cover;" class="w-[100%] h-[400px] lg:h-[600px] flex flex-col lg:flex-row lg:items-center">
                <div class="text-white flex flex-col gap-[20px] items-center lg:w-[50%] lg:items-start">
                    <p class="text-[30px] font-bold text-center lg:text-[70px] lg:text-start">Transforming Data into  <span class="bg-[#0A84FF] rounded-2xl p-[7px]">Decisions</span></p>
                    <p class="font-[300]">Leverage the power of machine learning and AI to unlock insights and drive business growth</p>
                    <button class="bg-[#0A84FF] text-[14px] font-bold py-[12px] px-[25px] rounded-[10px] w-[160px]">Book a Meeting</button>
                    <div class="flex gap-[15px] items-center">
                      <div>
                        <img src="./src/images/Group 20.png" alt="">
                      </div>
                      <p class="text-[14px] font-[300]">Over <span class="font-[600]">100+ </span> clients have worked with us</p>
                    </div>
                </div>
                <div>
                    <img class="w-[300px] lg:w-[700px]" src="./src/images/robot area.png" alt="">
                </div>
            </div>
        </section>
        <section class="grid grid-cols-2 my-[150px] max-w-[1300px] m-auto lg:grid-cols-6">
            <div>
                <img src="./src/images/Card.png" alt="">
            </div>
            <div>
                <img src="./src/images/Card-2.png" alt="">
            </div>
            <div>
                <img src="./src/images/Card-3.png" alt="">
            </div>
            <div>
                <img src="./src/images/Card-4.png" alt="">
            </div>
            <div>
                <img src="./src/images/Card-5.png" alt="">
            </div>
            <div>
                <img src="./src/images/Card-6.png" alt="">
            </div>

        </section>
    </main>

</html>
